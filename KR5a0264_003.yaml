front:
  text: 修真十書雜著指玄篇卷之三珍三
  hash: sha256:4c526d7f3927bf4e37e2b2cc51adc6b9878eee8f8a0b28547ba25480f1f3f016
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0264_HFL_003-001a, image: hfl/0122/0122-050.png}
body:
  text: 庭經翠虛真人述絳宫天子統乾乾乾龍飛上九華天天中妙有無極宫宫中萬卷指玄篇篇篇皆露金丹旨千句萬句會一言教人只去尋汞鉛二物採入鼎中煎夜來火發崑崙山山頭火冷月光寒曲江之上金烏飛嫦娥既與斗牛歡採之錬之未片餉一氣渺渺通三關三關來往氣無窮一道白脈朝泥丸泥丸之上紫金鼎鼎中一塊紫金團化作玉漿流入口香甜清爽遍舌端吞之服之入腹內藏府暢甚身康安赤蛇蒼龜交合時風恬浪靜虎龍蟠神水湛湛華池靜白雪紛紛飛四邊七寶樓臺十二層樓前黃花深可觀即此可謂鉛汞精化作精髓盈關源但去身中尋周天前弦以後後弦前藥物平平氣象足天地日月交會間虛空自然百雜碎嚼破混沌軟如綿翻來覆去成一錢遍體玉潤而金堅赤血換兮白血流金光滿室森森然一池秋水浸明月一朵金花如紅蓮此時身中神氣全不須求道復參襌我今知君如此賢知君有分為神仙分明指示無多語默默運用而抽添年中採月不用年月中取日月從然日中取時時易日時中有刻而玄玄玄之又玄不可言元來朔望明晦弦金翁姹女奪造化神鬼哭泣驚相喧雲收雨散萬籟靜一粒玄珠種玉田十月火候聖胎圓九轉七返相回旋初時夾眷關脈開其次膀胱如火燃內中兩腎如湯煎時乎挑動衝心原心腎水火自交感金木間隔誰使然黃庭一氣居中宫宰制萬象心掌權水源清清如玉鏡孰使河車如行船一霎火焰飛燒天烏魂兔魄如微塵如斯默默覓真筌一條徑路入靈真分明精裏以氣存漸漸氣積以生神此神乃是天地精純陽不死為真人君知如此宜修仙修仙惟有金丹門金丹亦無第二訣身中一畒為家園唾精津氣血液七件隂物何取焉坎中非腎乃靈根潭底日紅牝馬奔七返九還在片餉一切萬物皆生成惟此乾坤真運用不必兀兀從無言無心無念神巳昏安得凝聚成胎仙胎仙只是交結成交結惟在頃刻間君還知有大腸回正在冬至幾日前又言金精既降時復以何物復金精金精只是坤宫藥坤主西南為川源蟾光終日照西川只此便是藥之根以時易日刻易時一滴甘露名靈泉吞入心經衝肺腧落在膀胱而成丹丹頭不在膀胱結元在膀胱却在肝肝為木液遇金精逢土交結成大還莫言此是有為功又恐斯為著相言始於著相至無相錬精化氣氣歸根氣之根本凝成神方曰無為而通靈譬如夫婦交媾時一點精血結成嬰彼之以情而感精尚且嬰兒十月成何況宇宙在乎手身中虎嘯龍呤聲雖然不見龍之呤波浪高湧千萬尋雖然不見虎之嘯夜深風聲吼萬林自乎丹道凝結後以至火候烹錬足及於十月霜飛時神鬼奔走安敢爭一年都計十二月卯酉沐浴誰敢行所以十月入神室金鼎滿滿龍精盈縛雲捉月之機關得訣修錬夫何難果然縛得雲在山又解捉住月之魂點對此語知古人何慮不把身飛升身之鷇兮心之肉心中自有無價珍可以生我亦死我既能飢人亦飽人尋真揣路求其原逍遙快樂無飢寒似此境象與證驗總在一日工夫間工夫如此譬似間藥之不逺採不難誰知火焰萬丈紅接殺三尸玉爐寒丹田亦能生紫芝黃庭又以生紅精紅精一餐永不飢紫芝一服常童顔滿身渾是白乳花金筋玉骨永不死不死自此得功成功成行滿鶴來至一舉便要登雲端隂符髓夫神仙抱一之道者上天所祐也世不可得之乃太乙含真之元太乙者太極太淵之源是虛無錬神之道一者氣也人能將太乙真氣與我真氣相濟包含太和久而錬之乃為大丹丹者純陽也陽者天道也故神合道聚則成形散則成風故與道相通通者道養氣養氣者神保神天道也故曰精氣相濟久而用火乃真氣戰退隂魔是謂純陽錬形以身為國以心為君以精為民形者爐也首者鼎也精滿於腦故用火錬火者陽也息者風也以風吹火錬形神形神俱妙故曰鍊形鍊形者先須存心於內真氣沖和火乃丹陽之氣純粹之精運行不絶升沉往還周而復始包含萬類故乃丹陽也天地者隂陽之精也天氣降而復升地氣升而復降天之陽晶為日地之隂晶為月若得斗柄之機自然斡動日月運行而無休息乃純陽鍊神之道天樞之上天元一氣注之天樞之下地元一氣注之天樞之中隂之與陽人能混之上下無窮與天齊年今之人而不能知者貪欲忘精用心失神勞形散氣以故冥然而死故謂五賊之敗也所謂見之者昌不見則亡五賊者五行之正氣也天真者道之元也長養萬物生殺機權造化之本久而滿於體內精與天真相濟天氣降於地地氣接之而不相離若能識之故不死矣廣成子曰吾一萬二千歲皆因五行正理也五行者五藏也水得一氣人腎屬於水人未生之前以道為本但人命門上應北方太乙之源造化之根次生左腎此中生日脈脈湧騰朝元下至巽坤中有元基聚四時之氣入於中宫併而朝於頂上故施行於天頭圓象天足方象地中理五行之正氣也聚入絳宫散而達於筋骨上下而復湧泉混合萬神故乃青陽至首群隂皆散更用天之五行正氣內降五行共處入鼎修鍊成丹故不死矣天以斗為機人以心為機天機運於隂陽人機則成大道大道者無為也無為性不亂性不亂則神不移神不移則精不散精不散則氣不蕩氣不蕩則精火相隨精火不散萬神聚於神鄉在於崑崙之內朝於頂上始得一氣之造化也故道生一一生二二生三三生萬物一者天地之根隂陽之本萬物賴此以生成千靈資之以舒慘至於高天厚地洞府神仙玄象靈宫神真聖像未有一物不同元氣而生者也夫未生之時先受天氣故為人性然後二氣相合故乃成形人能澄心如天不動故同天地人心者機本也人能存其心守其神以心為性以氣為命而不能行者氣絶命亡皆因亂性散神天道者清氣也人受一氣體養萬神純陽之理故謂天之道殺機者造化也龍者氣也蛇者火也若運精氣上下往來奪天地造化故曰機也若去五欲動於機權如天之作人腎中青陽之真為之龜蛇上通天元之氣呼吸而上下相應起而離陸地也廣成子曰臍下一寸三分氣海中有真精一合內有二經左曰丹陽經右曰靈陽經二經上通於腦其中有府名曰靈陽府府中有二穴左曰太極穴右曰沖虛穴上通天氣下至海元故曰呼吸天氣下降而養真精上者為龍青陽之本下者為蛇則元氣始也二氣相交而成大藥久錬成丹故不死矣久錬神趨物外故曰起陸人發殺機守於陽神隂陽升降天以冬夏二至人以一呼一吸呼則至於根吸則至於蒂一吸天氣下降一呼地氣上騰我以真氣運下元地氣上於天故曰天地返覆天性不可亂神氣不可移能與精氣交而生萬神若天地安和而長萬物聖人內默聰明外屏嗜欲靜居太始之先未始有巧拙之辨三要者玄牝玉户金關上通於天下通於地切勿眼觀心動耳聽神移口談氣散故三要動之神散也但人心中有二竅左曰玄右曰牝下入氣海上通泥丸此真相通玉户金關夾眷相湊過三關而朝北極陽穴動而養真廣成子曰木去火則不灰人去性則不死火出神散神散氣離氣離身亡國有姦久而破身有邪久而死去姦則寧去邪則安天地盜太虛人蠱盜天地蠑虰者人腹之蟲爍我魂魄亡我神氣散我精血若能還隂陽造化之機勿能害耳聖人以機籌運法造化之機如是修錬天界天以一氣長養萬物人受一氣而生萬神散一氣以盜而死古聖人食天氣自有時自調百脈暢飲太和真氣注想身田即得五臟清涼六府調泰關節元氣精神安也廣成子曰氣之柔弱穿筋骨安精神皆使關節通流豈不理乎神機內用千變萬化天運機而養萬物人運機而化不窮人知外象有吉凶之兆即壽而應而不知自巳有神乃為神仙所為神也日月者隂陽之至晶也周遊八極寒暑相推剋天地之意定於日月周遊之道也日出月入在於數中數者一也一者氣也聖人得之通天地隂陽地理固氣養神不失於道萬變始也君子可以固窮下士聞笑而輕命三返在於三元天元真氣居首靈元真氣居中本元真氣居下精者師也心者王也身者形也三陽循於內久而神自朝元故不死矣以天道而化下方萬物受道所生自然而然乃大恩生不以色欲緃其心安其心而保其氣造化自恩生也剪其欲正其心定其氣守神抱一至靜而日新必達於源至於神隂陽之本也目不視色神不移神不移其氣內藏至樂天真終無所擾廣成子曰禽者南方之鳥也人能致伏真精力久如禽飛騰太虛不過以氣而作飛仙損有餘而補不足有餘者心不足者精有餘不能損則其不足不能補補不足者是害也節欲潛形物束無味有恩存焉害中恩也天地之理聖人之機至道之苗萬物之本隂陽之宗故造化無窮聖人於至道之精我之有也道之勃然萬物自物我哲耳隂陽非勝我之用勝之者我神我靈而隂陽同勝天地者二氣結而萬物皆同也哲同神氣聖人也而異於人故作神仙矣內三要出黃帝隂符經第一要者頭太淵也天谷神所居之位是也上應玄都萬神會集之鄉人能開此谷神自居真息自定飢渴自除矣第二要者心絳宫也人能虛心凝神得神氣俱定息不往來謂之大定矣夫神者天地之元性命之本日月之祖龍虎之首隂陽之根每一息動四至太上言二十四動為一刀二百四十動為一圭故聖人謂之刀圭第三要者在兩腎之間水火之際謂之地户此關有神謂之桃康上通九天下通湧泉真氣聚散皆從此關故聖人言天門常開地户永閉人能會此三要神氣自然交結隂符經曰九竅之邪在此三要正此意也外三要外三要者玄牝之門也口通五臟出者重濁之氣屬隂一切百榖諸咪皆地之精從口而入與地相接謂之地根鼻通六腑出者輕清之氣屬陽摟其天此乃天根太上言玄牝之門是為天根鼻有兩竅口有一竅共三竅此是神氣往來之門陽神為玄隂息為牝此門中有天魂地魄與我神氣混而為一故強名曰玄牝二物也修真十書雜著指玄篇卷之三
