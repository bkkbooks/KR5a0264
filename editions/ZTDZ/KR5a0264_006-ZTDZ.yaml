front:
  text: 修眞十書雜箸指玄篇卷之六
  hash: sha256:31e1d95bdd51f098f1818a8b7978f91505322879e1f6453b25c600b43044fbf7
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0264_SJB_006-040624c, image: sjb/04/040624c.png}
body:
  text: 謝張紫陽書白玉蟾某稽首百拜上覆祖師天台悟眞先生紫陽眞人張君門下即日伏以入春風雨萬象翠寒恭惟水草谷神天丁左右龍精溢體火候沖寂滿室金花歸根復命甞聞天下無二道聖人無兩心道之大不可得而形容若形容此道則空寂虚無妙湛淵默也心之廣不可得而比喻若比喻此心則清靜靈明沖和温粹也會萬化而歸一道則天下皆自化而萬物皆自如也會百爲而歸一心則聖人自無爲而百爲自無著也推此心而與道合此心即道也體此道而與心會此道即心也道融於心心融於道也心外無别道道外無别物也所以天地本未甞乾坤而萬物自乾坤耳日月本未甞離坎而萬物自離坎耳緬惟我道祖太上老君曉天下以此道明聖人以此心此道之在天下不容以物物不容以化化故凡物物化化之理在天下而不在此道也此道如如也以此心而會此道可也此心之在聖人不容以知知不容以識識之理在聖人而不在此心也此心如如也以此道而會之此心可也道此道以脉此心心此心而髓此道吾亦不知孰爲道孰爲心也但見恍恍惚惚杳杳冥冥似物非物似象非象以耳聽之則眼聞以眼視之則耳見吾恐此而名之曰隂陽之髓混沌之精虚空之根太極之蒂也前輩不知强名曰道以今觀之虹喚虹作惚蝀也玉指玉作碔砆也此而非金丹乎今夫知金丹之妙也夫何用泥象之安鑪著相而造鼎謂如黄芽白雪非可見之黄芽白雪神水華池非可用之神水華池喻之爲鉛精汞髓比之爲金精木液何處烹偃月之鑪何處錬朱砂之鼎知此則曰日烏月兔也天馬地斗也乾坤本無離坎之用離坎亦無乾坤之體紅鉛黑汞非龍虎交媾之物乎白金黑鍚非龜蛇交合之象乎二八九三皆隂陽之異義斤銖兩數乃混沌之餘事要之配合而調和抽添而運用故此藥物非金石草木之料此火候非年月日時之數父母未生以前儘有無窮活路身心不動以後復有無極眞機昨以夙縁針芥枯骨更生久侍師傍幸沾法乳謂夫修錬金丹之旨採藥物於不動之中行火候於無爲之内以神氣之所沐浴以形神之所配匹然後知之中自有無限藥材身中自有無限火符如是而悟之謂丹如是而修之謂道鑿石以求玉陶沙以取金錬形以養神明心以合道皆一意也所謂鉛中取水銀砂中取汞之旨也依而行之夫歡婦合以此理而質之儒書則一也以此理而質之佛典則一也所以天下無二道也天之道旣無二理而聖人之心豈两用耶形中以神爲君神乃形之命也神中以性爲極性乃神之命也自形中之神以合神中之性此謂之歸根復命也斯道甚明矣此心不惑矣如七返九還之祕世所不傳夫七返九還者乃返本還源之義也七數九數者皆陽數也人但能心中無心念中無念純清絶點謂之純陽當此之時三尸消滅六賊乞降身外有身猶未竒特虚空粉碎方露全身也流俗淺識末學凡夫豈知元始天尊與天仙地仙日日採藥用而不停藥物愈採而無窮也又豈知山河大地與蠢動含靈時時行火候而無暫停火候愈行而不歇也只此火候與藥物順之則凡逆之則聖古語有云五行顚倒大地七寳五行順行法界火坑此義也先師泥丸先生翠虚眞人出於祖師毗陵和尚薛君之門而毗陵一線實自祖師杏林先生石君所傳也石君承襲紫陽祖師之道以今日單傳而觀則曩者天台一夜西華之夢無非後世蒙福萬靈幸甚耶頃年泥丸師挈至霍童洞天焚香端拜杏林祖毗陵祖極荷呼喚撫身持耳以還愈增守雌抱一之意昨到武夷見馬自然口述諄諭出示寳翰凡四百言字字藥石仰認愛育甘露灑心毛骨豁然比因妙道昭著久居支提茲來渠以嬰兒離毋之故欲到青城山省覲偶縁道過石鷰洞遂發一念附此尺書但述金丹大藥之體如此至於蕉花春風之機梧枝秋雨之祕碧潭之夜月青山之暮雲以此深妙莫敢顯露也以有天機之故祖師一點頭否杏林毗陵泥丸三師想參鶴翼自愧仙凡路隔何日温養事畢飛神御氣叅陪飛舄之下以備呼鸞喚鶴之役臨紙不勝依戀涕落筆端恍失所措敢乞泛紫筏駕丹梯儲積金砂垂手群蠢不備謝仙師寄書詞夫金丹者採二八兩之藥結三百日之胎心上工夫不在呑津嚥氣先天造化要須聚氣凝神若要行持須憑口訣至簡至易非色非空無中養就嬰兒隂内錬成陽氣使金公生擒活虎令姹女獨駕赤龍乾夫坤婦而媒假黄婆離女坎男而結成赤子一鑪火焰錬虚空化作微塵萬頃冰壷照世界大如黍米神歸四大即龜蛇交合之時氣入四肢是烏兔鬱羅之處玉葫蘆迸出黄金之液金菡蓞開成白玉之花正當風冷月明時誰會山青水緑意聖師口口歷代心心即一言貫穿萬卷仙經但片餉工夫無窮逸樂先明三五一行九陽眞火以錬之後至萬百千到嬰兒寳物則成矣銀山鐵壁一錐直下打開金鎖玉關舉步自然無礙見萬里是無塵之境作千年永不死之人海變桑田我在逍遥遊之摬衣磨劫石同歸無何有之郷玉蟾素志未回初誠宿恪自嗟蒲柳之質幾近桑榆之年老頰猶紅如有神仙之分嫰鬚再黑始歸道徳之源嘆古人六十四歳將謂休得先聖八十一章來受用拊膺落涕緘口捫心從來作用功勞捕風捉影此日虚無訣法點鐵成金恭惟聖師泥丸翁翠虚眞人拓世英雄補天手叚心傳雲雨深深旨手握雷霆赫赫權顧王蟾三代感師恩千年待眞馭說刀圭於癸酉秋月之夕盡坎離於乙亥春雨之天終身懷大寳於杳冥永劫守玄珠於清淨先覺詔後覺巳銘感於心傳彼時同此時愈不忘於道念忽承鶴使擲示鸞牋戒回會於武夷有身被沮溺將捐軀於龍虎無翅可飛行雨臥風飡奔歸侍下且此山瞻斗仰甚切愚衷擢犀角磨象牙當效行持之力攀龍鱗附鳯翼願叅沖舉之雲先貢非詞少伸素志匪伊聽譴感激何言大宋丙子閏七月二十四日鶴奴白玉蟾焚香稽首再拜修眞十書雜著指玄篇卷之六
