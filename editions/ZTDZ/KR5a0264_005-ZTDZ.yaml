front:
  text: 修眞十書雜著指玄篇卷之五六同卷珎五
  hash: sha256:93d66d3e39507030ed581a6471fc50c0d75eb87eca92b85e1ee36132ef44dcc6
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0264_SJB_005-040620b, image: sjb/04/040620b.png}
body:
  text: 金丹四百字并敘紫陽張眞人撰七返九還金液大丹者七乃火數九乃金數以火錬金返本還源謂之金丹也以身心分上下兩弦以神氣别冬夏二至以形神契坎離二卦以東魂之木西魄之金南神之火北精之水中意之土是爲攅簇五行以舍眼光凝耳韻調鼻息緘舌氣是爲和合四象以眼不視而魂在肝耳不聞而精在腎舌不聲而神在心鼻不香而魄在肺四肢不動而意在脾故名曰五氣朝元以精化爲氣以氣化爲神以神化爲虚故名曰三花聚頂以魂在肝而不從眼漏魄在肺而不從鼻漏神在心而不從口漏精在腎而不從耳漏意在脾不從四肢孔竅漏故曰無漏精神魂魄意相與混融化爲一氣不可見聞亦無名狀故曰虚無錬精者錬元精非淫佚所感之精錬氣者錬元氣非口鼻呼吸之氣錬神者錬元神非心意念慮之神故此神氣精者與天地同其根與萬物同其體得之則生失之則死以陽火錬之則化成陽氣以隂符養之則化成金精故曰見之不可用用之不可見身者心之宅心者身之主心之猖狂如龍身之獰惡如虎身中有一點眞陽之氣心中有一點眞隂之精故曰二物心屬乾身屬坤故曰乾坤鼎器陽氣屬離隂精屬坎故曰烏兔藥物抱一守中錬元養素故曰採先天混元之氣朝屯暮蒙晝午夜子故曰行周天之火候木液旺在卯金精旺在酉故當沐浴震男飲西酒兊女攀北花巽風吹起六陽坤土藏蓄之數故當抽添夫採藥之初也動乾坤之橐籥取離坎之刀圭初時如雲滿千山次則如月涵萬水自然如龜蛇之交合馬牛之步驟殊不知龍爭魂虎爭魄烏戰精兔戰神恍惚之中見眞鉛杳冥之内有眞汞以黄婆媒合守在中宫鉛見火則飛汞見火則走遂以無爲油和之復以無名璞鎭之鉛歸坤宫汞歸乾位眞土混合舍光默默火數盛則燥水銖多則濫火之燥水之濫不可不調勺故有斤兩法度修錬至此泥丸風生絳宫月明丹田火熾榖海波澄夾眷如車輪四肢如山石毛竅如浴之方起骨脉如睡之正酣精神如夫婦歡合魂魄如子毋留戀此乃眞境界也非譬喻也以法度錬之則聚而不散以斤兩錬之則結而愈堅魂藏魄滅精結神凝一意沖和肌膚爽透隨日隨時漸凝漸聚無質生質結成聖胎夫一年十有二月也一月三十日也一日百刻也一月緫計三千刻十月緫計三萬刻行住坐臥綿綿若存胎氣旣凝嬰兒顯相玄珠成象太乙含眞故此三萬刻之中可以奪天上三萬年之數何也一刻之工夫自有一年之節候所以三萬刻可以奪三萬年之數也故一年十二月緫有三萬六千之數雖愚暗小人行之立躋聖地奈何百姓日用而不知也元精喪也元氣竭也元神雜也是以三萬刻刻刻要調和如有一刻差違則藥材消耗火候虧缺故曰毫髪差殊不作丹也是宜刻刻用事用之不勞眞氣凝結元神廣大内則一年錬三萬刻之丹外則一身奪三萬年之數大則一日結一萬三千五百息之胎小則十二時行八萬四千里之氣故曰奪天地一點之陽採日月二輪之氣行眞水於鉛鑪運眞火於汞鼎以鉛見汞名曰華池以汞入鉛名曰神水不可執於無爲不可形於有作不可泥於存想不可著於特守不可枯坐灰心不可盲修瞎錬惟恐不識藥材出處又恐不知火候法度要須知夫身中一竅名曰玄牝此竅者非心非腎非口鼻也非脾胃也非榖道也非膀胱也非丹田也非泥丸也能知此之一竅則冬至在此矣藥物在此矣火候亦在此矣沐浴在此矣結胎在此矣脫體亦在此矣夫此一竅亦無邊傍更無内外乃神氣之根虚無之谷在身中而求不可求於他也此之一竅不可以私意揣度是必心傳口授苟或不耳皆妄爲矣今作此金丹四百字包含造化之根基貫穿隂陽之骨髓使錬丹之士尋流而知源舍妄以從眞不至乎忘本逐末也夫金丹於無中生有養就嬰兒豈可泥象執文而溺於旁蹊曲徑然金丹之生於無也又不可爲頑空常知此空乃是眞空無中不無乃眞虚無今因馬自然去講此數語汝其味之眞土擒眞鉛眞鉛制眞汞鉛汞歸眞土身心寂不動眞土者身中之土也鉛汞者身中之水火也以土剋水則鉛可擒矣以水剋火則汞可制矣鉛水汞火皆爲眞土之擒制者何哉蓋縁身心俱合寂然不動而後土水木三者可以混融爲一此乃是採藥物歸鑪鼎之内也虚無生白雪寂靜發黄芽玉鑪火温温鼎上飛紫霞白雪須要虚空而生以其無中生有黄芽須待火養而生以其火能生土正如天地之間當子丑之月陽氣未萌是物泯於無也則白雪自天而下及寅卯之月陽氣漸盛是靜中有動也則黄芽自地而出矣白雪黄芽旣見發生則玉鑪之火但要温養自然鼎上紫霞騰空而飛若火大武則衝散矣華池蓮花開神水金波靜夜深月正明天地一輪鏡華者花也花猶火也神者心也心屬火也金丹之要在乎神水華池即是水火旣濟之理水中有波瑩然潔靜則火裏生蓮自然開花矣若則夜半子時一陽初動其月正明透體金光照見天地之間如一輪之明鏡朱砂錬陽氣水銀烹金精金精與陽氣朱砂而水銀陽氣者身中一點眞陽之氣金精者心中一點眞隂之精以陽火錬之則如朱砂以隂符養之則如水銀朱砂水銀乃外物也以外藥而比内丹神仙不得巳而語矣日魂玉兔脂月魄金烏髓掇來歸鼎中化作一泓水魂主木木能生火故神者魂藏之魄主金金能生水故精者魄藏之苟能吸風以養神吸氣以養精精神混合調和於鼎内則化爲一泓水藥物生玄竅火候發陽鑪龍虎交會時寳鼎産玄珠藥物者烏肝兔髓紅汞黑鉛也皆生於玄竅之中若能奮三昧之火發陽鑪之内則龍虎交會錬金木生黄芽而後産一粒之玄珠此竅非凡物乾坤共合成名爲神氣穴内有坎離精玄牝之竅非凡間物未有此身先有此竅不在上不在下不在中間所謂先天一竅是也方其生身之初乾父之精坤母之血相共合成乃神氣之穴而藏水火之精木汞一點紅金鉛三斤黑鉛汞結丹砂耿耿紫金色紅者汞色紅爲一點黑者鉛也色黑重三斤金中之鉛木中之汞兩者凝結便成丹頭更加九轉火候則其色如紫金家園景物麗風雨正春深犂鋤不廢力大地皆黄金家園者身中之眞土也景物者身中之藥物也迨夫一陽來復之後有風以吹之有雨以潤之及至三陽交泰之時雖犂鋤不廢其力而大地皆黄芽自土中而迸出也以黄金言之取其黄芽之色如金也眞鉛生於坎其用在離宫以黑而變紅一鼎雲氣濃眞汞産於離其用却在坎姹女過南園手持玉橄欖眞鉛者北精之水而上升於離宫眞汞者南神之火而下降於坎户鉛之與汞合而爲一近觀則有紅黑色逺看則如玉橄欖姹女過南園而乗龍嬰兒徃北地而騎虎龍蟠金鼎虎遶丹田雲從龍風從虎其一鼎之内藹然雲氣之薫蒸矣震兊非東西坎離不南北斗柄運周天要人會攅簇震兊坎離非凡間之東西南北乃天地之卦氣也正如斗柄之指月建一日一周天身中之起火符頃刻一周天若不能攅簇五行則何以同斗柄之運轉火候不用時冬至不在子及其沐浴法卯酉時虚比大凡火候非子時冬至午時夏至也及其沐浴非卯時春分酉時秋分也人之一身纔起火周天自有抽添沐浴非可拘泥於四時也烏肝與兔髓擒來歸一處一粒復一粒從微而至著烏肝者日魂也兔髓者月魄也擒制爲一處而以火錬之日生一粒如黍米大自微至著積錬而成兩三十日重三十八銖四絫三百日重三百八十四銖方圓一寸而重一斤矣混沌包虚空虚空括三界及尋其根源一粒如黍大夫混沌者隂陽交媾也乃是攅簇五行合和四象則量同虚空而虚空可包矣神遊三界而三界可括矣推究其根元之所在則起於玄牝之門大如一粒之黍天地交眞液日月含眞精會得坎離基三界歸一身心液下降腎液上升則天地交眞液矣魂是烏之精魄是兔之髓則日月含眞精矣若人曉得坎離交媾之基則天門開地户閉日照崑崙月生滄海而三界在吾一身矣龍從東海來虎向西山起兩獸戰一場化作天地髓震爲青龍來從東海兊爲白虎起向西山若使龍吟雲起而下降虎嘯風生而上升二獸相逢交戰於黄屋之前則風雲慶會自混合爲一塊髓矣金花開汞葉玉蒂長鉛枝坎離不曾閑乾坤今幾時金花者金精也上有金花能開汞葉玉帝者玉液也下有玉蒂能長鉛枝人能使坎離之運用不至閑散則一刻之工夫可奪天地一年之數能要幾多時候沐浴防危險抽添自謹持都來三萬刻差失恐毫釐沐浴乃超脫之法七層寳塔三級紅樓自下而升要防危險抽添乃朝元之法陽起子初隂生午後若不謹持終須有失夫一日百刻也一月三千刻刻刻用事用之不勞則十月三萬刻可奪三萬之數若毫髪差殊不作丹矣夫婦交會時洞房雲雨作一載生箇兒箇箇會騎鶴坎宫嬰兒離宫姹女若得黄婆媒合而結爲夫婦洞房交接雨散雲収便成聖胎及至一載生兒便跨鶴自泥丸宫出矣夫十箇月懷胎兩箇月沐浴共成一載矣子註金丹四百字後口占律詩五首按金木水火土四首言命基末一首言性基性是命之體命是性之用蓋取其四象五行全籍土也所謂鼎器藥物符火法度抽添沐浴結胎脫體皆在其中矣用陳瑕纇句尚頼琢磨工是予有望於先達者也再序一人身何物是金丹恍惚眞陽向内觀天上風吹清浪沸地中雷起紫雲蟠玉鑪夜夜烹鉛伏金鼎時時製汞乾息火不差七百二泥丸霹靂覺生寒二鵲橋有路透玄關立鼎安鑪自不艱四象合和憑籍土三花會聚返還山子初運入崑崙去午後周流滄海間更待玉壷點化後頂門迸出換仙顔三要識五行顚倒顚龍居山下虎居田巽宫吹起乾天火離位開通坤地泉復姤抽添宜謹愼屯蒙沐浴要孜專若能識得生身處十月胎完出世仙四得道來來未有年玄關上面打鞦韆金烏偏好山頭宿玉兔常居海底眠一氣薫蒸從北起三軍搬運向東邊吾非漏泄天機事切恐迷人愛亂宣五曹溪教外别流傳悟者何拘後與先性地混融成一片心珠圓朗照三田釋迦寂滅非眞死達麽西歸亦是仙但願世人明此理同超彼岸不須船修眞十書雜箸指玄篇卷之五
