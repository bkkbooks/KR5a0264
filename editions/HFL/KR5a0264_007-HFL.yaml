front:
  text: 修眞十書雜著指玄篇卷之七八同卷珎六
  hash: sha256:ec39883d97fc91a0612d974b8d37c0f3f3468ec5472aeadccb7112e880f291bb
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0264_HFL_007-001a, image: hfl/0122/0122-132.png}
body:
  text: 垂世八寳西山許眞君述忠則不欺孝則不悖修身如此可以成德廉而罔貪謹乃無失寛則得衆裕然有餘接人以此怨咎滌除容而翕受忍則安舒醉思仙歌玉皇有勑分仙職龍吐露兮鳯借力須臾立下看華夷仙花未遇人未識吾上大羅觀世界世界如同手掌大當時不是上昇忙一齊携向瀛洲邁若將此藥作丹田烏兔交加一二年神水纔乾枝萬丈早知身巳屬神仙醉思仙醉思仙無事閑來謁洞天鸞鳯别來經歳月多時不跨赤龍軿雲思島鶴思天萬物通生本自然華池會飲顔如玉飛躍金精臉似蓮神思主氣思元無爲造化不可言玄珠閣上収白玉水精宫裏採紅蓮鉛思汞汞思鉛奪得乾坤造化權性命都來兩箇字隱在仙經萬萬篇天思地地思天天地包含萬象全雞抱卵時須日定無中識有幾人觀水思海海思源衝開牛斗要循環璣玉衡皆有緒誰人搬運入泥丸心思妙意思玄臍間元氣結成丹谷神不死因胎息長生門户要綿綿朝思道暮思仙暗行隂隲萬神安内交眞氣存呼吸自然造化返童顔常思善莫思寃善惡分明在眼前積善之家昇天去積惡漂流苦海邊靜思哲動思賢若無功行豈輕傳純陽篇裏分明說一法傳人索教難感上帝謝神仙祕傳玄妙離凡縁三清殿裏添香火日有清風掃古壇檜因嫰細盤龍易梧桐枯朽斷琴難藤蘿引蔓成華蓋玉笋殊無半點斑嶺上煙雲風浩浩洞前流水響潺潺一聲長笑清雲漢步虚詞徹王京山龍吟鳯舞紅霞遶虎嘯猿啼紫霧盤青龍到關徐甲放白虎西昇尹喜看師吟道徳教人悟丹經須是口相傳貪名貪利何年盡争似飲酒抱琴眠清霄良夜月當年又聞師訓五三言虚度一日無一日過了一年少一年浮漚浪打能長久石中迸火豈爲堅龍會翫珠方脫骨蜣因飲露化爲蟬鶴因朱頂三千歳龜飲瑶池不計年露漿醖就逢人飲仙藥長供野客飱萬物歸根皆復命爲人學道不修丹芭蕉雨打驚仙夢覺來海水變桑田人生幻化如春夢性命隨風瞬息間犬猶舐鼎隨龍變雞飡大藥化成鸞擇福地揀名山無爲清淨轉心閑符篆玉簡搜神鬼剱射牛光慘慘寒鑪懸古鏡看新火玄霜滿鼎化紅蓮大藥錬時須九轉靈砂養就待三年纎銖分兩神仙訣抽添沐浴入寒泉一粒飡了天地夀死生生死不相干丹成自有沖天志惟留祕訣在人間頓悟醉思仙島去洞門微掩小童看鸞鶴來時昇紫霧玉皇有勑登仙路九玄七祖盡升天更兼骨肉全家舉身披六銖頂簮冠足履昇雲待移步千年絲竹徹雲霄霓曲遍仙鸞鶴舞上朝三清謝聖毋久住人間度寒暑較量功行可眞如姓名巳録仙籍簿丹訣歌鍾離與呂公知君幸有英靈骨所以教君心恍惚含元殿上水晶宫分明指與神仙窟大丈夫遇眞訣須要執持心猛烈五行匹配自刀圭執取龜蛇顚倒訣三尸神須打疊進退天機憑六甲知之三要萬神歸來駕火龍離九闕九九道至成眞日三清四御朝天節氣翱翔兮神烜赫蓬萊便是吾家宅群仙會飲樂喧喧雙童引入朝元客道心不退故傳君立誓盟言親灑血逢人兮莫亂說遇友兮不須訣莫怪頻發此言辭輕慢必有隂功折執手相别意如何今日辭君遂作歌說盡千般玄妙理未必君心信也麽子後分明說與汝保惜吾言上大羅丹髓歌三十四章薛道光錬丹不用尋冬至身中自有一陽生龍飛赤水波濤湧虎嘯丹山風露清二初時有如雲出洞次則有如月在潭又似金蠶如玉笋好將火候錬三三三嬌如西子離金閤美似嫦娥下玉樓日日與君花下醉更嫌何處不風流四井底泥蛇舞柘枝䆫間明月照梅梨夜來混沌顚落地萬象森羅緫不知五昔日遇師親口訣只要凝神入氣穴以精化氣氣養神錬作黄芽并白雪六一年沐浴更防危十月調和須謹節服了丹砂朝玉帝乗雲跨鶴登天闕七烏無影兔無形烏兔只是日月精烏兔交時天地永八牛無角馬無蹄馬牛只是乾坤髓乾坤運用坎和離九龜無象蛇無跡龜蛇只是隂陽形二氣交會混爲一十龍無翼虎無牙龍虎本來同一體東隣即便是西家十一鉛非鉛汞非汞鉛汞元在身中求要使身心寂不動十二無白雪無黄芽白雪乃爲神室水黄芽便是氣樞花十三夫眞夫婦眞婦坎男離女交感時虚空無塵天地露十四眞交梨眞火棗交梨喫後四肢輕火棗吞時萬劫飽十五夏至後冬至前隂陽不在此中取自有神氣分兩弦十六水眞水火眞火依前應候運周天調和錬盡長生寳十七日之魂月之魄身中自有眞乾坤煅錬丹一通透赤十八天之尊地之卑便把天魂擒六賊又將地魄制三尸十九藥非物火非候分明只是一點陽錬作萬劫無窮盡二十金非兊木非震從來眞土應五行金木自然解交併二十一黒中黒白中白但能守黑白自现黑白本來無二色二十二金眞金銀眞銀金銀錬作紫金丹自然無一斧鑿痕二十三偃月鱸朱砂鼎須知抱一守沖和不必透關提玉井二十四中央釜守一壇金鼎常令湯用暖王鑪不要火教寒二十五玄眞玄牝眞牝玄牝都來共一竅不在口鼻并心腎二十六眞神水眞華池元氣虚無難捉摸元氣恢漠本無爲二十七錬朱砂錬水銀眞死朱砂匱水銀水銀錬作明䆫塵二十八眞黄礜眞紫粉分明内鼎内鑪中變化瓦石成九轉二十九眞關鎖眞河車鐵鎖金關牢固守河車運用結丹砂三十眞金精眞王液金精滿鼎氣歸根玉液盈壷神入室三十一眞金翁眞姹女金翁姹女結親姻洞房深處眞雲雨三十二眞丁翁眞黄婆丁翁運火錬金花黄婆瓶裏養金鵝三十三眞嬰兒眞赤子九轉錬成十月胎純陽無隂命不死三十四眞隂陽眞隂陽隂陽都只兩箇字譬喻丹書幾萬章後序夫錬金丹之士須知冬至不在子時沐浴亦非卯酉鉛汞二物皆非唾㖒精津氣血液也七返者返本儿還者還源金精木液遇土則交龍虎馬牛揔皆無相先師悟眞篇所謂金丹之要在乎神水華池者即鉛汞也人能知鉛之出處則知汞之所産旣知鉛與汞則知神水華池旣知神水華池則可以錬金丹金丹之功成於片時不可執九載三年之日程不可泥年月日時而運用鍾離所謂四大一身皆屬隂也如是則不可就身中而求特可尋身中一點陽精可也然此陽精在乎一竅常人不可得而猜度也只此一竅則是玄牝之門正所謂神之華池也知此則可以採取然後交結其次烹錬至於沐浴以及分胎更須温養成丹成丹可不辨川源知斤兩識時日者耶泰自從得師訣以來知此身不可死知此丹必可成今旣大事入手以此詔諸未來學仙者云杏林石泰得之序修眞十書雜著指玄篇卷之七
