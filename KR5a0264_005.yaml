front:
  text: 修真十書雜著指玄篇卷之五六同卷珍五
  hash: sha256:1aa0f086129930e173e411511803a0fa219a4a7fdd0e04480a9bde6a862bf9b5
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0264_HFL_005-001a, image: hfl/0122/0122-092.png}
body:
  text: 金丹四百字并敘紫陽張真人撰七返九還金液大丹者七乃火數九乃金數以火錬金返本還源謂之金丹也以身心分上下兩弦以神氣别冬夏二至以形神契坎離二卦以東魂之木西魄之金南神之火北精之水中意之土是為攢簇五行以舍眼光凝耳韻調鼻息緘舌氣是為和合四象以眼不視而魂在肝耳不聞而精在腎舌不聲而神在心鼻不香而魄在肺四肢不動而意在脾故名曰五氣朝元以精化為氣以氣化為神以神化為虛故名曰三花聚頂以魂在肝而不從眼漏魄在肺而不從鼻漏神在心而不從口漏精在腎而不從耳漏意在脾不從四肢孔竅漏故曰無漏精神魂魄意相與混融化為一氣不可見聞亦無名狀故曰虛無錬精者錬元精非淫佚所感之精錬氣者錬元氣非口鼻呼吸之氣錬神者錬元神非心意念慮之神故此神氣精者與天地同其根與萬物同其體得之則生失之則死以陽火錬之則化成陽氣以隂符養之則化成金精故曰見之不可用用之不可見身者心之宅心者身之主心之猖狂如龍身之獰惡如虎身中有一點真陽之氣心中有一點真隂之精故曰二物心屬乾身屬坤故曰乾坤鼎器陽氣屬離隂精屬坎故曰烏兔藥物抱一守中錬元養素故曰採先天混元之氣朝屯暮蒙晝午夜子故曰行周天之火候木液旺在卯金精旺在酉故當沐浴震男飲西酒兊女攀北花巽風吹起六陽坤土藏蓄之數故當抽添夫採藥之初也動乾坤之橐籥取離坎之刀圭初時如雲滿千山次則如月涵萬水自然如龜蛇之交合馬牛之步驟殊不知龍爭魂虎爭魄烏戰精兔戰神恍惚之中見真鉛杳冥之內有真汞以黃婆媒合守在中宫鉛見火則飛汞見火則走遂以無為油和之復以無名璞鎮之鉛歸坤宫汞歸乾位真土混合舍光默默火數盛則燥水銖多則濫火之燥水之濫不可不調勺故有斤兩法度修錬至此泥丸風生絳宫月明丹田火熾榖海波澄夾眷如車輪四肢如山石毛竅如浴之方起骨脉如睡之正酣精神如夫婦歡合魂魄如子毋留戀此乃真境界也非譬喻也以法度錬之則聚而不散以斤兩錬之則結而愈堅魂藏魄滅精結神凝一意沖和肌膚爽透隨日隨時漸凝漸聚無質生質結成聖胎夫一年十有二月也一月三十日也一日百刻也一月總計三千刻十月總計三萬刻行住坐臥綿綿若存胎氣既凝嬰兒顯相玄珠成象太乙含真故此三萬刻之中可以奪天上三萬年之數何也一刻之工夫自有一年之節候所以三萬刻可以奪三萬年之數也故一年十二月總有三萬六千之數雖愚暗小人行之立躋聖地奈何百姓日用而不知也元精喪也元氣竭也元神雜也是以三萬刻刻刻要調和如有一刻差違則藥材消耗火候虧缺故曰毫髮差殊不作丹也是宜刻刻用事用之不勞真氣凝結元神廣大內則一年錬三萬刻之丹外則一身奪三萬年之數大則一日結一萬三千五百息之胎小則十二時行八萬四千里之氣故曰奪天地一點之陽採日月二輪之氣行真水於鉛爐運真火於汞鼎以鉛見汞名曰華池以汞入鉛名曰神水不可執於無為不可形於有作不可泥於存想不可著於特守不可枯坐灰心不可盲修瞎錬惟恐不識藥材出處又恐不知火候法度要須知夫身中一竅名曰玄牝此竅者非心非腎非口鼻也非脾胃也非榖道也非膀胱也非丹田也非泥丸也能知此之一竅則冬至在此矣藥物在此矣火候亦在此矣沐浴在此矣結胎在此矣脫體亦在此矣夫此一竅亦無邊傍更無內外乃神氣之根虛無之谷在身中而求不可求於他也此之一竅不可以私意揣度是必心傳口授苟或不耳皆妄為矣今作此金丹四百字包含造化之根基貫穿隂陽之骨髓使錬丹之士尋流而知源舍妄以從真不至乎忘本逐末也夫金丹於無中生有養就嬰兒豈可泥象執文而溺於旁蹊曲徑然金丹之生於無也又不可為頑空常知此空乃是真空無中不無乃真虛無今因馬自然去講此數語汝其味之真土擒真鉛真鉛制真汞鉛汞歸真土身心寂不動真土者身中之土也鉛汞者身中之水火也以土剋水則鉛可擒矣以水剋火則汞可制矣鉛水汞火皆為真土之擒制者何哉蓋緣身心俱合寂然不動而後土水木三者可以混融為一此乃是採藥物歸爐鼎之內也虛無生白雪寂靜發黃芽玉爐火溫溫鼎上飛紫霞白雪須要虛空而生以其無中生有黃芽須待火養而生以其火能生土正如天地之間當子丑之月陽氣未萌是物泯於無也則白雪自天而下及寅卯之月陽氣漸盛是靜中有動也則黃芽自地而出矣白雪黃芽既見發生則玉爐之火但要溫養自然鼎上紫霞騰空而飛若火大武則衝散矣華池蓮花開神水金波靜夜深月正明天地一輪鏡華者花也花猶火也神者心也心屬火也金丹之要在乎神水華池即是水火既濟之理水中有波瑩然潔靜則火裏生蓮自然開花矣若則夜半子時一陽初動其月正明透體金光照見天地之間如一輪之明鏡朱砂錬陽氣水銀烹金精金精與陽氣朱砂而水銀陽氣者身中一點真陽之氣金精者心中一點真隂之精以陽火錬之則如朱砂以隂符養之則如水銀朱砂水銀乃外物也以外藥而比內丹神仙不得巳而語矣日魂玉兔脂月魄金烏髓掇來歸鼎中化作一泓水魂主木木能生火故神者魂藏之魄主金金能生水故精者魄藏之苟能吸風以養神吸氣以養精精神混合調和於鼎內則化為一泓水藥物生玄竅火候發陽爐龍虎交會時寶鼎産玄珠藥物者烏肝兔髓紅汞黑鉛也皆生於玄竅之中若能奮三昧之火發陽爐之內則龍虎交會錬金木生黃芽而後産一粒之玄珠此竅非凡物乾坤共合成名為神氣穴內有坎離精玄牝之竅非凡間物未有此身先有此竅不在上不在下不在中間所謂先天一竅是也方其生身之初乾父之精坤母之血相共合成乃神氣之穴而藏水火之精木汞一點紅金鉛三斤黑鉛汞結丹砂耿耿紫金色紅者汞色紅為一點黑者鉛也色黑重三斤金中之鉛木中之汞兩者凝結便成丹頭更加九轉火候則其色如紫金家園景物麗風雨正春深犂鋤不廢力大地皆黃金家園者身中之真土也景物者身中之藥物也逮夫一陽來復之後有風以吹之有雨以潤之及至三陽交泰之時雖犂鋤不廢其力而大地皆黃芽自土中而迸出也以黃金言之取其黃芽之色如金也真鉛生於坎其用在離宫以黑而變紅一鼎雲氣濃真汞産於離其用却在坎姹女過南園手持玉橄欖真鉛者北精之水而上升於離宫真汞者南神之火而下降於坎户鉛之與汞合而為一近觀則有紅黑色逺看則如玉橄欖姹女過南園而乘龍嬰兒往北地而騎虎龍蟠金鼎虎繞丹田雲從龍風從虎其一鼎之內藹然雲氣之薰蒸矣震兊非東西坎離不南北斗柄運周天要人會攢簇震兊坎離非凡間之東西南北乃天地之卦氣也正如斗柄之指月建一日一周天身中之起火符頃刻一周天若不能攢簇五行則何以同斗柄之運轉火候不用時冬至不在子及其沐浴法卯酉時虛比大凡火候非子時冬至午時夏至也及其沐浴非卯時春分酉時秋分也人之一身才起火周天自有抽添沐浴非可拘泥於四時也烏肝與兔髓擒來歸一處一粒復一粒從微而至著烏肝者日魂也兔髓者月魄也擒制為一處而以火錬之日生一粒如黍米大自微至著積錬而成兩三十日重三十八銖四絫三百日重三百八十四銖方圓一寸而重一斤矣混沌包虛空虛空括三界及尋其根源一粒如黍大夫混沌者隂陽交媾也乃是攢簇五行合和四象則量同虛空而虛空可包矣神遊三界而三界可括矣推究其根元之所在則起於玄牝之門大如一粒之黍天地交真液日月含真精會得坎離基三界歸一身心液下降腎液上升則天地交真液矣魂是烏之精魄是兔之髓則日月含真精矣若人曉得坎離交媾之基則天門開地户閉日照崑崙月生滄海而三界在吾一身矣龍從東海來虎向西山起兩獸戰一場化作天地髓震為青龍來從東海兊為白虎起向西山若使龍吟雲起而下降虎嘯風生而上升二獸相逢交戰於黃屋之前則風雲慶會自混合為一塊髓矣金花開汞葉玉蒂長鉛枝坎離不曾間乾坤今幾時金花者金精也上有金花能開汞葉玉帝者玉液也下有玉蒂能長鉛枝人能使坎離之運用不至間散則一刻之工夫可奪天地一年之數能要幾多時候沐浴防危險抽添自謹持都來三萬刻差失恐毫釐沐浴乃超脫之法七層寶塔三級紅樓自下而升要防危險抽添乃朝元之法陽起子初隂生午後若不謹持終須有失夫一日百刻也一月三千刻刻刻用事用之不勞則十月三萬刻可奪三萬之數若毫髮差殊不作丹矣夫婦交會時洞房雲雨作一載生箇兒箇箇會騎鶴坎宫嬰兒離宫姹女若得黃婆媒合而結為夫婦洞房交接雨散雲收便成聖胎及至一載生兒便跨鶴自泥丸宫出矣夫十箇月懷胎兩箇月沐浴共成一載矣子注金丹四百字後口占律詩五首按金木水火土四首言命基末一首言性基性是命之體命是性之用蓋取其四象五行全籍土也所謂鼎器藥物符火法度抽添沐浴結胎脫體皆在其中矣用陳瑕纇句尚賴琢磨工是豫有望於先達者也再序一人身何物是金丹恍惚真陽向內觀天上風吹清浪沸地中雷起紫雲蟠玉爐夜夜烹鉛伏金鼎時時製汞乾息火不差七百二泥丸霹靂覺生寒二鵲橋有路透玄關立鼎安爐自不艱四象合和憑籍土三花會聚返還山子初運入崑崙去午後周流滄海間更待玉壷點化後頂門迸出換仙顔三要識五行顚倒顚龍居山下虎居田巽宫吹起乾天火離位開通坤地泉復姤抽添宜謹愼屯蒙沐浴要孜專若能識得生身處十月胎完出世仙四得道來來未有年玄關上面打鞦韆金烏偏好山頭宿玉兔常居海底眠一氣薰蒸從北起三軍搬運向東邊吾非漏泄天機事切恐迷人愛亂宣五曹溪教外别流傳悟者何拘後與先性地混融成一片心珠圓朗照三田釋迦寂滅非真死達麼西歸亦是仙但願世人明此理同超彼岸不須船修真十書雜箸指玄篇卷之五
