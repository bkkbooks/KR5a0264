front:
  text: 修眞十書雜著指玄篇巻之二珎二
  hash: sha256:e74d20524587b028dea242accf32e283016b32ff705af5d9faef2362500ba6ca
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0264_HFL_002-001a, image: hfl/0122/0122-024.png}
body:
  text: 還源篇序杏林眞人石泰得之撰泰素慕眞宗遍遊勝境叅傳正法願以濟世爲心專一存三尤以養生爲重蓋謂學仙甚易而人自難脫塵不難而人未易深可哀哉古云迷雲鎖慧月業風吹定海昔年以驛中遇先師張紫陽先生所簡易之語不過半句其證驗之效只在片時知仙之可學私自生歡喜及其金液交結聖胎圓成泰故作還源篇八十一章五言四句以授晚學早悟眞筌莫待老來鉛虚汞少急須猛省尋師訪道修錬金丹同成仙果變化飛升乃所願望還源篇八十一章以按純陽之數一鉛汞成眞體隂陽結太元但知行二八便可錬金丹二汞是青龍髓鉛爲白虎脂掇來歸鼎内採取要知時三姹女騎鉛虎金公跨汞龍甲庚明正令錬取一鑪紅四蛇魄擒龍髓龜魂制虎精華池神水内一朶玉芝生五白雪飛瓊苑黄芽發玉園但能知偃月何處錬紅鉛六藥材開混沌火候錬鴻濛十月胎仙化方知九轉功七龍正藏珠處雞方抱卵時誰知鉛汞合正可飲刀圭八沐浴資坤水吹嘘頼巽風嬰兒無一事獨處太微宫九紫府尋離女朱陵配坎男黄婆媒娉處太極自函三十乾馬馳金户坤牛入木宫阿誰將姹女嫁去與金翁十一姹女方二八金翁正九三洞房生瑞氣歡合産初男十二昨夜西川岸蟾光照碧濤採來歸玉室鼎内自煎熬十三離坎非交媾乾坤自化生人能明此理一點落黄庭十四丹谷生神水黄庭有大倉更無飢渴想一直入仙郷十五意馬歸神室心猿守洞房精神魂魄意化作紫金霜十六一孔玄關竅三關要路頭忽然輕運動神水自然流十七制魄非心制拘魂豈意拘惟留神與氣片餉結玄珠十八口訣無多子修丹在片時温温行火候十月産嬰兒十九夫婦初歡合年深意轉濃洞房交會處無日不春風二十驟雨紙蝴蝶洪鑪玉牡丹三更紅日赫六月素霜寒二十一海底飛金火山巔運土泉片時交媾就玉鼎起青煙二十二鑿破玄元竅衝開混沌關但知烹水火一任虎龍蟠二十三娑竭水中火崑崙山上波誰能知運用大意要黄婆二十四藥取先天氣火尋太易精能知藥取火定裏見丹成二十五元氣如何服眞精不用移眞精與元氣此是大丹基二十六儒家明幻理釋氏打頑空不識神仙術金丹頃刻功二十七偃月鑪中汞朱砂鼎裏鉛龜蛇眞一氣所産在先天二十八朔望尋弦晦抽添象缺圓不知眞造化何物是眞鉛二十九氣是形中命心爲性内神能知神氣穴即是得仙人三十木髓烹金鼎泉流注玉鑪誰將三百日慢慢著工夫三十一玉液滋神室金胎結氣樞只尋身内藥不用揣丹書三十二玉鼎烹鉛液金鑪養汞精九還爲九轉温養象周星三十三火棗元無核交梨豈有查終朝元火候神水灌金花三十四欲錬先天氣先乾活水銀聖胎如結見破頂见雷鳴三十五錬氣徒施力存神枉用工豈知丹訣妙鎭日翫眞空三十六氣産非干腎神居不在心氣神難捉摸化作一團金三十七一竅名玄牝中藏氣與神有誰知此竅更莫外尋眞三十八脾胃非神室膀胱乃腎餘勸君休執泥此不是丹樞三十九内景詩千首中黄酒一撙逍遥無物累身外有乾坤四十烏兔相煎煑龜蛇自繞纏化成丹一粒温養作胎仙四十一萬物皆生死元神死復生以神歸氣内丹道自然成四十二神氣歸根處身心復命時這般眞孔竅料得少人知四十三身裏有玄牝心中無垢塵不知誰解識一竅内涵眞四十四離坎眞龍虎乾坤正馬牛人人皆具足因甚不知修四十五魂魄爲心主精神以意包如如行火候默默運初爻四十六心下腎上處肝西肺左中非腸非胃腑一氣自流通四十七妙用非關意眞機不用時誰能知此竅且莫任無爲四十八有物非無物無爲合有爲化權歸手内烏兔結金脂四十九虎嘯西山上龍吟北海東捉來須野戰寄在艮坤宫五十復姤司明晦屯蒙直曉昏丹鑪凝白雪無處覓心猿五十一黒汞生黄葉紅鉛綻紫花更須行火候鼎裏結丹砂五十二木液須防兔金精更忌雞抽添須沐浴正是月圓時五十三萬籟風初起千山月乍圓急須行正令便可運周天五十四藥材分老嫰火候用抽添一粒丹光起寒蟾射玉簾五十五蚌腹珠曽剖雞窠卵易尋無中生有物神氣自相侵五十六神氣非子毋身心豈夫婦但要合天機誰識結丹處五十七丹頭初結處藥物已凝時龍虎交相戰東君緫不知五十八旁門并小法異術及閑言金液還丹訣渾無第二門五十九貴賤并高下夫妻與弟兄修仙如有分皆可看丹經六十屋破修容易藥枯生不難但知歸復法金寳積如山六十一魂魄成三性精神會五行就中分四象攅簇結胎精六十二定志求鉛汞灰心覓土金方知眞一竅誰測此幽深六十三造化無根蒂隂陽有本原這些眞妙處父子不堪傳六十四留汞居金鼎將鉛入玉池主賔無左右只要識嬰兒六十五黄婆雙乳美丁老片心慈温養無他術無中養就兒六十六絳闕翔青鳯丹田養王蟾壷中天不夜白雪落纎纎六十七琴瑟和諧後箕裘了當時不須行火候又恐損嬰兒六十八長男纔入兊少女便歸乾巽宫并土位關鎖自周天六十九弦後弦前處月圓月缺時抽添象刑徳沐浴按盈虧七十老汞三斤白眞鉛一點紅奪他天地髓交媾片時中七十一火候通玄處古今誰肯傳未曾知採藥且莫問周天七十二雲散海棠月春深楊柳風阿誰知此意舉目問虚空七十三人間無物累天上有仙階巳解乗雲了相將白鶴來七十四心田無草穢性地絶塵飛夜靜月明處一聲春鳥啼七十五白金烹六卦黑鍚過三關半夜三更裏金烏入廣寒七十六丹熟無龍虎火終休汞鉛脫胎巳神化更作玉清仙七十七塞斷黄泉路衝開紫府門如何海蟾子化鶴出泥丸七十八江海歸何處山巖屬甚人金丹成熟後緫是屋中珍七十九呂承鍾口訣葛授鄭心傳緫没閑言語都來只汞鉛八十汞鉛歸一鼎日月要同鑪進火須防忌教君結玉酥八十一採藥并交結進火與沐浴及至脫胎時九九陽數足修眞十書雜著指玄篇卷之二
