front:
  text: 修真十書雜著指玄篇卷之四珍四
  hash: sha256:99655ed364f63e2208123382b3c7d63ce507778d122ecd04914311dba62de9b4
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0264_HFL_004-001a, image: hfl/0122/0122-072.png}
body:
  text: 修仙辨惑論海南白玉蟾自糿事陳泥丸忽巳九年偶一日在乎巖阿松隂之下風清月朗夜靜煙寒因思生死事大無常迅速遂稽首再拜而問曰玉蟾事師未久自揣福薄緣淺敢問今生有分可仙乎陳泥丸云人人皆可況於汝乎玉蟾曰不避尊嚴之責輒伸僣易之問修仙有幾門錬丹有幾法愚見如玉石之未分願得一言點化陳泥丸云爾來吾語汝修仙有三等錬丹有三成夫天仙之道能變化飛升也上士可以學之以身為鉛以心為汞以定為水以慧為火在片餉之間可以凝結十月成胎此乃上品錬丹之法本無卦爻亦無斤兩其法簡易故以心傳之甚易成也夫水仙之道能出入隱顯也中士可以學之以氣為鉛以神為汞以午為火以子為水在百日之間可以混合三年成象此乃中品錬丹之法雖有卦爻却無斤兩其法要妙故以口傳之必可成也夫地仙之道能留形住世庶士可以學之以精為鉛以血為汞以腎為水以心為火在一年之間可以融結九年成功此乃下品錬丹之法既有卦爻又有斤兩其法繁難故以文字傳之恐難成也上品丹法以精神魂魄意為藥材以行住坐臥為火候以清淨自然為運用中品丹法以肝心脾肺腎為藥材以年月日時為火候以抱元守一為運用下品丹法以精血髓氣液為藥材以閉咽搐摩為火候以存想升降為運用大抵妙處不在乎按圖索駿也若泥象執文之士空自傲慢至老無成矣玉蟾曰讀丹書許多年如在荊棘中行今日塵淨鑑明雲開月皎總萬法而歸一包萬幻以歸真以未知正在於何處下手用功也陳泥丸云善哉問也夫錬丹之要以身為壇爐鼎竈以心為神室以端坐習定為採取以操持照顧為行火以作止為進退以斷續不專為防隄以運用為抽添以真氣薰蒸為沐浴以息念為養火以制伏身心為野戰以凝神聚氣為守城以忘機絶慮為生殺以念頭起處為玄牝以打成一塊為交結以歸根復命為丹成以移神為換鼎以身外有身為脫胎以返本還源為真空以打破虛空為了當故能聚而成形散則成氣去來無礙逍遙自然矣玉蟾問曰勤而不遇必遇至人遇而不勤終為下鬼若此修丹之法有何證驗陳泥丸云初修丹時神清氣爽身心和暢宿疾普消更無夢寐百日不食飲酒不醉到此地則赤血換為白血隂氣錬成陽氣身如火熱行步如飛口中可以乾水吹氣可以煮肉對景無心如如不動役使鬼神呼召雷雨耳聞九天自視萬里遍體純陽金筋玉骨陽神現形出入自然此乃長生不死之道畢矣但恐世人執著藥物火候之説以為有形有為而不能頓悟也夫豈知混沌未分以前烏有年月日時父母未生以前烏有精血氣液道本無形喻之為龍虎道本無名比之為鉛汞若是學天仙之人須是形神俱妙與道之合真可也豈可被隂陽束縛在五行之中要當跳出天地之外方可名為得道之士矣或者疑曰此法與禪法稍同殊不知終日談演問答乃是乾慧長年枮兀昏沉乃是頑空然天仙之學如水精盤中之珠轉漉漉地活潑潑地自然圓陀陀光皪皪所謂天仙者此乃金仙也夫此不可言傳之妙也人誰知之人誰行之人若曉得金剛圓覺二經則金丹之義自明何必分别老釋之異同哉天下無二道聖人無兩心何況人人具足箇箇圓成政所謂處處緑楊堪繫馬家家門閫透長安但取其捷徑云耳玉蟾曰天下學仙者紛紛然良由學而不遇遇而不行行而不動乃至老來甘心赴死於九泉之下豈不悲哉今將師傳口訣鋟木以傳于世惟此漏露天機甚矣得無譴乎泥丸云吾將點化天下神仙苟獲罪者天其不天乎經云我命在我不在於天何譴之有玉蟾曰祖師張平叔三傳非人三遭禍患何也泥丸云彼一時自無眼力又況運心不普乎噫師在天涯弟子在海角何況塵勞中識人為甚難令但刋此散行天下使修仙之士可以尋文揣義妙理昭然是乃天授矣何必乎筆舌以傳之哉但能凝然靜定念中無念工夫純粹打成一片終日默默如雞抱卵則神歸氣復自然見玄關一竅其大無外其小無內則是採取先天一氣以為金丹之母勤而行之指日可與鍾呂並駕矣此乃巳試之效念學仙者無所指南謹集問答之要名之曰修仙辨惑論云谷神不死論谷者天谷也神者一身之元神也天之谷含造化容虛空地之谷容萬物載山川人與天地同所稟也亦有谷焉其谷藏真一宅元神是以頭有九宫上應九天中間一宫謂之泥丸又曰黃庭又名崑崙又名天谷其名頗多乃元神所住之宫其空如谷而神居之故謂之谷神神存則生神去則死日則接於物夜則接於夢神不能安其居也黃糧未熟南柯未寤一生之榮辱富貴百歲之悲憂悅樂備嘗於一夢之間使其去而不還遊而不返則生死路隔幽明之途絶矣由是觀之人不能自生而神生之人不能自死而神死之若神居其谷而不死人安得而死乎然谷神所以不死者由玄牝也元者陽也天也牝者隂也地也然則玄牝二氣各有深旨非遇至人授以口訣不可得而知也靈樞內經曰天谷元神守之自真言人身中上有天谷泥丸藏神之府也中有應谷絳宫藏氣之府也下有靈谷關元藏精之府也天谷元宫也乃元神之室靈性之所存是神之要也聖人則天地之要知變化之源神守於元宫氣騰於牝府神氣交感自然成真與道為一而入於不死不生故曰谷神不死是謂玄牝也聖人運用於玄牝之內造化於惚恍之中當其玄牝之氣入乎其根間極則失於急任之則失於蕩欲其綿綿續續勿令間斷耳若存者順其自然而存之神久自寧息久自定性入自然無為妙用未嘗至於勤勞迫切故曰用之不勤即此而觀則玄牝為上下二源氣母升降之正道明矣世人不窮其根不究其源便以鼻為玄以口為牝若以鼻口為玄牝則玄牝之門又將何以名之此皆不能造其妙非大聖人安能窮究是理哉隂陽升降論天以乾道輕清而在上地以坤道重濁而在下元氣則運行乎中而不息在上者以陽為用故冬至後一陽之氣自地而升積一百八十日而至天陽極而隂生在下者以隂為用積一百八十日而至地隂極而陽生一升一降往來無窮人受沖和之氣以生於天地之間與天地初無二體天地之氣一年一周人身之氣一日一周自子至巳陽升之時故以子時為日中之冬至在易為復自午至亥隂降之時故以午時為日中之夏至在易為媾隂極陽生陽極隂生晝夜往來亦猶天地之升降人能效天地橐籥之用沖虛湛寂一氣周流於百骸開則氣出闔則氣入氣出則如地氣之上升氣入則如天氣之下降自可與天地齊其長久若也奔驟乎紛華之域馳騁乎是非之場則真氣耗散而不為吾之有矣不若虛靜守中以養也中者天地玄牝之氣會聚之處也人能一意守之而不散則真精自朝元氣自聚谷神自接三尸自去九蟲自滅此乃長生久視之道也以是知真息元氣乃人身性命之根深根固蒂乃長生久視之道人之有生稟大道一元之氣在毋胞繫與母同呼吸及乎降誕之後剪去臍蒂一點元陽棲於丹田之中真息出入通於天門與天相接上入泥丸會於元神下入丹田通於元氣莊子云衆人之氣為喉聖人之息為踵踵也者深根固蒂之道人能屏去諸念真息自定身入無形與道為一在世長年由是觀之道之在身豈不尊乎豈不貴乎丹房法語白先生與胡胎仙吕先生鶴頸龜腮適有鍾離之會石居士鹿鼻鼠耳偶逢平叔之來歎夤緣時節之難豈名利是非之比金丹大藥古人以萬劫一傳玉笥靈篇學者之十迷丸昧月裏烏日裏兔顚倒坎離水中虎火中龍運用復姤採先天一氣作鉛中之髓奪星象萬化為汞裏之精惟弦前弦後之時乃望缺望圓之際知之者癸生須急採昧之者望逺不堪嘗精半斤氣半斤總在西南之位砂一兩藥一兩實居東北之鄉收金精木液歸於黃庭錬白雪黃芽結成紫粉悟真篇所謂華池神水知命論又言地魄天魂採之錬之結矣成矣如夫婦最初一點十月成胎似君臣共會萬機百官列職遇日中冬至則野戰遇時中夏至則守城都來片餉工夫要在一日證驗九三二八算來只在姹女金翁七六十三窮得無過黃婆丁老更不用看丹經萬卷也只消得口訣一言子之來意甚勤知汝積年求慕非夙生有此半骨豈一旦用是身心自採藥以至結胎從行火而及脫體包括抽添之妙形容沐浴之機無金木間隔之憂有水土同鄉之慶但須溫養都沒艱辛十二時中只一時三百日內在半日丹田有物行住坐臥以無愁紫府書名生死輪回而不纍了然快樂自此凊間這工夫向閙裏也堪行論玄妙只頃中都交結聚而不散錬之尤堅朱砂鼎偃月爐何難尋之有守一壇中央釡惟自巳而求宜識隂陽要知玄牝龍精滿鼎遣金童下十二層樓鳯髓盈壷令玉女報三千世界此時丹熟更須慈母惜嬰兒不日雲飛方見真人朝上帝修真十書雜著指玄篇卷之四
