front:
  text: 修真十書金丹大成集卷之一珍七
  hash: sha256:0c27a098a487a4e469027782083d362ef52b9abca42d499b9317d6e201042d43
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0264_HFL_001-001a, image: hfl/0122/0122-004.png}
body:
  text: 紫虛了真子蕭廷芝元瑞述無極圖説者道也形而上者謂之道斯乃道之體也無極而太極舍三為一中具五十五數中者乃其本體也太極一判兩儀生焉之動根乎隂也之靜根乎陽也此陽變隂合而生水火土金木也水生數一成數六火生數二成數七木生數三成數八金生數四成數九土生數五成數十此五行生成之數也天一地二天三地四天五地六天七地八天九地十天地之數五十有五此陽竒隂偶之數也一隂一陽之謂道生生不窮之謂易一者竒數也二者偶數也陽竒隂偶即二以生三也純乾性也兩乾而成坤命也猶精與氣也乾再索坤而成坎坎中之陽乃元氣也所謂乾道成男是也坤再索乾而成離離中之隂乃真精也所謂坤道成女心有九竅謂之金鼎金金形如彈丸鼎丹色同朱橘圖圖黃帝鑄九鼎者此也兩箇一般無二樣神嬰室離種種邊壺中有天兒圖玄之又玄入衆妙門圖始知功滿出塵埃刀玄三花聚頂玄牝之門圭飲刀圭者味道之腴牝玄牝五氣朝元是謂天地根圖圖攢偃簇月三點如皇勢五爐橫鈎似月斜行爐圖和合四象圖丹法參同三十對偶清濁盈虧衰旺存亡有無吉凶悔吝生剋刑德動靜進退消長賔主沉浮升降老嫩文武剛柔離合聚散往來上下雌雄黑白守戰生殺剝復深淺抽添寒暑丹法參同七鑑華池心源性海謂之華池神水性猶水也謂之神水黃芽心地開葉謂之黃芽白雪虛室生白謂之白雪河車一氣周流謂之河車巽風巽者順也順調其心金丹清淨光明圓通廣大丹法參同十九訣一採藥收拾身心斂藏神氣二結丹凝氣聚念不動三烹錬玉符保神金液錬形四固濟忘形絶念謂之固濟五武火奮迅精神驅除雜念六文火專氣致柔含光默默溫溫不絶綿綿若存七沐浴洗心滌慮謂之沐浴八丹砂有無交入隱顯相符九過關果生枝上終期熟子在胞中豈有殊十分胎雞能抱卵心常聽燀到成彩殼自分十一溫養知白守黑神明自來十二防危一念外馳火候差失十三工夫朝收暮採日錬時煎十四交媾念念相續同成一片十五大還對景無心晝夜如一十六聖胎存其神於中藏其氣於內十七九轉火候足時嬰兒自現十八換鼎子又生孫千百億化十九太極形神俱妙與道合真金丹捷徑指玄圖三忘形忘氣忘神關圖養氣養神養虛性神是性屬離坤之中陰命圖氣是命屬坎乾之中陽産藥藥在西南是本鄉川源蟾光終日照西川圖藥物是火火屬心心為汞火是藥藥屬身身為鉛候真黃房黃婆戊己土黃庭土釜是圖四象圖龍身是虎劎身東魄充虎飢虎來食噉生髓脂受氣虎圖心是龍凝心息念任龍蟠龍蟠潭裏珠光寒鍊神金液還丹金丹捷徑葉和叔夫金丹者以內鉛外汞而錬之非金石草木也七返九還而成變化飛升之藥也紅中而見黃知白而守黑此金丹之鉛汞也華嶽山頭之風扶桑海底之浪此金丹之龍虎也神室之鸞鳯丹房之雲雨此金丹之夫婦也日魂漏天髓月魄運地脂此金丹之烏兔也二氣之循環一元之斡運此金丹之龜蛇也文火以溫養武火以煆錬此金丹之火候也若夫丹道之沐浴也坤水坎水丹道之吹噓也巽風離風噫金丹之妙不傳也抽添按日月盈虧象天地刑德法卯酉交會併金木至如水源之清濁火候之遲速藥材之老嫩交媾之終始胎仙之變化又不可不知也知此則讀群仙珠玉廓然一悟恍然釋然如蕙蘭之正春風似梧桐之乍秋雨似松林之夜雪似竹徑之夕陽此金丹之味也淡然如春空之白雲皎然如秋潭之素月冥然如嬰兒之未孩晦然如耆叟之欲耄此金丹之得處也金丹如此修錬藥物如此採取水火如此運用丹道如是而交結如是而成就也群仙珠玉一帙古今所未有也胡胎仙何如人棄儒拔俗之夫未委其仙與否也其命意如此亦古人也金丹論蓋聞太極未判之先混然虛寂清濁未分形如雞子一氣既判二儀生焉故清靈之氣浮之為天濁重之氣降而為地沖和之氣結而為人故三才定位萬物乃生古之聖人仰以觀於天文俯以察於地理中敘其人倫故伏犧始畫八卦以推窮天地之物象以明其造化之源流以乾坤合天地之動靜以坎離同日月之循環以五藏分為五行上應五星之連珠內明五氣之相制乃知肝藏其魂位居其東而有青龍之號肺藏其魄位居其西而有白虎之稱心藏其神位居其南而有朱雀之名腎藏其精位居其北而有玄武之喻脾藏其志位居其中而有土德之尊故水得其土則潛其形火得其土則隱其明金得其土以增其色木得其土以溢其潤於是龍虎交媾於玉爐水火既濟於金鼎飛真精於肘後運河車於玉京玄珠降於華池黃芽長於靈谷三尸奔逸六賊逃亡陽神聚而成仙金汞結而為寶始可超凡入聖與天齊年僕兹見白先生纂集丹書以內象造化分别五行推排八卦指陳丹竈明其火候隂陽升降龍虎交馳物象敷陳畫為圖像以示好道之流庶幾一見而昭著無疑得以坦途而入若按圖而行何惑之有修真論嘗謂大道眇冥人不易知是故聖人將奧旨藏於經典隱於萬物寓言立像無非欲度其迷昔抱朴子言水之有源其流必逺木之有根其葉必茂屋之有基其柱必正人之有精其命必長九子丹經曰人之可保者命可惜者身可存者氣可重者精太上玄鏡曰純陽上升者謂之氣純隂下降者謂之液氣液相交於骨髓之間者謂之髓氣髓相交於膀胱之外者謂之精心氣在肝肝精不固目眩無光心氣在肺肺精不實肌肉瘦弱心氣在腎腎精不固神氣減少心氣在脾脾精不堅齒髮浮落玉臟之中腎為精樞心為氣館真精在腎餘精自還下田真氣在心餘氣自歸元府故人之氣有八百一十丈九九八十一純陽之數過此巳往走失其精耗散元氣疾病隨生死亡隨至六廣成子授道於黃帝指其長生之術曰出入不離玄牝往來只在谷神杳杳冥冥其中有精恍恍惚惚其中有物知白守黑可以長生矣又觀虛靜先生曰大道不逺在身中物即皆空性不空性若不空和氣住氣歸元海夀無窮欲得身中神不出莫向靈臺留一物物在心中神不清耗散其精損筋骨夫道人則易知而難遇易遇而難成余昨訪師友參問金丹大藥火候抽添之法皆不言下手工夫人不得其蹊徑而入伏覩海南白先生所著修真養命之圖設象以明大道之奧庶幾同志之士依圖而行之則誠為捷徑幸毋忽諸歲在淳祐甲辰暑月廖正敬書修真十書雜著指玄篇卷之一
