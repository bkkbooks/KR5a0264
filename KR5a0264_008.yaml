front:
  text: 修真十書雜著指玄篇卷之八
  hash: sha256:01976c0d8ece5e345b83e592f6e59d4e96166fd0f358f2797c85f7c3b0d37399
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0264_HFL_008-001a, image: hfl/0122/0122-152.png}
body:
  text: 修真十戒一者不得隂賊潛謀害物利巳當行隂德普濟群生二者不得殺害含生以充滋味當行慈惠以及昆蟲三者不得淫邪敗真穢慢靈氣當守節操毋使缺犯四者不得敗人成功交離親族當以道助物令衆雍和五者不得讒諛賢良露才揚巳當稱人之善不自伐其功能六者不得飲酒過差食肉違禁當調氣性專務清虛七者不得貪婪無厭積財不散當行節儉惠恤貧窮八者不得交遊非賢居處穢雜當務勝巳棲集幽間九者不得不忠不孝不仁不信當盡節君師推誠萬物十者不得輕忽言笑舉動非真當常懷廉謹以道德為務凡能持此十戒升為仙官衛生歌并敘西山先生世言服靈丹餌仙果白日而輕舉者但聞而未見也至如運氣之術甚近養生之道人稟氣血而生攝生論云攝生之要在去其害生者此明言也豫所編去病歌藎採諸家養生之要而為言能依而行之則獲安樂若盡其要妙亦長年之可覬歌曰萬物惟人為最貴百歲光隂如旅寄自非留意修養中未免病苦為心纍何必餐霞餌火藥妄意延齡等龜鶴但於飲食嗜欲間去其甚者將安樂食後徐徐行百步兩手摩脅并腹肚須臾轉手摩腎堂謂之運動水與土仰面仍呵三四呵自然食毒氣消磨醉眠飽臥俱無益渴飲飢餐猶戒多食不欲粗并欲速乍可少餐相接續若教一飽頓充腸損氣傷脾非爾福生餐粘膩筋韌物自死牲牢皆勿食饅頭閉氣不相宜生膾偏招脾胃疾鮓醬胎卵兼油膩陳臭醃醲盡隂類老衰莫欲更食之是借冦兵無以異炙煿之物須冷喫不然損齒傷血脈晚食常宜申酉前向夜徒勞滯胸膈注云脾好音樂夜食則脾氣不磨為音響斷絶故也周禮樂以侑食蓋脾好音聲絲竹耳才聞脾即磨矣是以音聲皆出於脾而夏月夜短尤宜忌之恐難消化故也飲酒莫教令太醉太醉傷神損心志渴來飲水兼飲茶腰腳自茲成重膇注云酒雖可以陶情性通血脈自然招風敗腎爛腸腐脅莫過於此飽食之後尤宜戒之飲酒不宜粗及速恐傷破肺肺為五臟之華蓋尤不可傷當酒未醒大渴之際不可喫水及啜茶多被酒引入腎臟為停毒之水遂令腰腳重墜膀胱冷痛兼水腫消渴攣躄之疾大抵茶之為物四時皆不可喫令人下焦虛冷唯飽食後喫一兩盞不妨蓋能消食故也飢則尤宜忌之常聞避風如避箭坐臥須當預防患況因飲後毛孔開風才一入成癱瘓注云凡坐臥處始覺有風宜速避之不可強忍且年老之人體竭內踈風邪易入始初不覺久乃損人故雖暑中不可當風取涼碎後操扇昔有人學得壽之道於彭祖而苦患頭痛彭祖視其寢處有穴當其腦户遽令塞之後遂無患不問四時俱暖酒太熱又須難向口五味偏多不益人恐隨臟腑成殃咎注云五味稍薄令人爽稍多隨其臟腑各有損傷故酸多傷脾辛多傷肝鹹多傷心苦多傷肺甘多傷腎此乃五行自然之理初傷不覺久乃成患視聽行坐不必久五勞七傷從此有注云久視傷心損血久坐傷脾損肉久臥傷肺損氣久行傷肝損筋久立傷腎損骨孔子所謂居必遷坐以是故也四肢亦欲得小勞譬如户樞終不朽注云人之勞倦有生於無端不必持重執輕仡仡終日惟是間人多生此病蓋間樂之人不多運動氣力飽食坐臥經脈不通血脈凝滯使然也是以貴人貌樂而心勞賤人心間而貌苦貴人嗜欲不時或昧於忌犯飲食珍羞使乃寢臥故常須用力但不至疲極所貴榮衛通流血脈調暢譬如流水不腐户樞不朽也臥不厭踧覺貴舒飽則入浴飢則梳梳多浴少益心目點寢暗眠神晏如注云臥宜側身屈膝益人心氣覺宜舒展則精神不散蓋舒臥則招魔引魅孔子寢不尸蓋謂是歟髮多梳則去風明目故道家晨梳常以百二十為數浴多則損人心腹令人倦怠寢不言者為五臟如鍾磬然不懸則不可發聲睡留燈燭令人神不安四時惟夏難將攝伏隂在內腹冷滑補腎腸藥不可無食物稍冷休哺啜注云夏一季是人脫精神之時心旺腎衰腎化為水至秋乃凝及冬始堅尤宜保惜故夏月不問老少悉喫暖物至秋即不患霍亂吐瀉腹中常暖者諸疾自然不生蓋血氣壯盛也心旺腎衰何所忌特忌踈通泄精氣寢處尤宜綿密間宴居靜慮和心意注云月令仲夏之月君子齊戒處必掩身毋躁止聲色毋或進薄滋味毋致和禁嗜欲定心氣沫浴盥漱皆暖水臥冷枕涼俱勿喜注云雖盛暑衝熱若以冷水洗面手即令人五臟乾枯少津液況沐浴乎凡枕冷物大損人目瓜茹生菜不宜人豈獨秋來多瘧痢注云茹性至冷菜瓜雖治氣又能暗人耳目驢馬食之即日眼爛此等之物大抵四時皆不可食不獨夏季老人尤宜忌之伏陽在內三冬月切忌汗多陽氣泄注云天地閉血氣藏緃有病亦不宜出汗隂霧之中無逺行暴雨震雷宜速避注云昔有三人冒霧早行一人空腹一人食粥一人飲酒空腹者死食粥者病飲酒者健蓋酒能禦霜露辟邪氣故也路中忽遇飄風震雷晦暝宜入室避之不爾損人當時未覺久則成患道家更有顧生旨第一令人少嗔惠秋冬日出始求衣春夏雞鳴宜早起注云春夏宜早起秋冬任晏眠晏忌日出後早忌雞鳴前子後寅前睡覺來瞑目叩齒二七回吸新吐故無令誤咽漱玉泉還養胎注云水之在口曰華池亦曰玉泉黃庭經曰玉泉清水灌靈根子若修之命長存達磨胎息論曰凡服食須半夜子後牀上瞑目盤坐面東呵出腹內舊氣三兩口然後停息便於鼻內微納清氣數口舌下有二穴通腎竅用舌柱上腭存息少時津液自出灌漱滿口徐徐咽下自然灌注五臟此為氣歸丹田矣如子後丑前不及但寅前為之亦可臥中為之亦可但枕不甚高可也漢蒯京年百二十歲日甚丁壯言朝朝服食玉泉扣齒二七名曰錬精後漢王真常漱舌下玉泉咽之謂之胎息孫真人曰髮宜多櫛手宜在面齒宜數叩津宜常咽氣宜精錬此五者即黃庭經所謂子欲不死修崑崙爾熱摩手心慰兩眼注云每慰二七遍使人眼目自然無障翳明目去風無出於此亦能補腎氣也仍更揩擦額與面注云頻拭額上謂之修天庭連髮際二七遍面上自然光澤皯點者宜頻拭之中指時將摩鼻邊注云鼻莖兩邊揩二三十數令表裏俱熱所謂灌溉中嶽以潤於肺左右耳眼筌數遍注云筌耳即摩耳輪也不拘遍數所謂修其城郭以補腎氣以防聾瞶也更能乾浴遍身間按䏶時須紐兩間緃有風勞諸冷氣何憂腰背復拘攣注云大凡人坐常以兩手按䏶左右紐肩數十噓呵呼嘻吹及呬行氣之人分六字果能依用口訣中新舊有痾皆可治聲色雖云屬少年稍知撙節乃無愆閉精息氣宜聞早莫使羽苞火中燃注云古人以色欲之事譬之凌杯以盛陽羽苞以畜火有能操履長方正於名無貪利無竸緃向歌中未盡行百行周身亦無病注云老子云善攝生者陸地不遇兕虎此道德之助也修真十書雜著指玄篇卷之八
